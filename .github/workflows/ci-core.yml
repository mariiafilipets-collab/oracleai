name: ci-core

on:
  pull_request:
    branches: [oracleai-fullstack, main]
  push:
    branches: [oracleai-fullstack]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run contracts:compile

      - name: Test contracts
        run: npm run contracts:test

      - name: Backend syntax check
        run: node --check backend/src/index.js

      - name: Frontend build
        run: npm run build --workspace=frontend
