name: deploy-autopilot

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod
      release_sha:
        description: "Commit SHA to deploy (optional)"
        required: false
        type: string
  push:
    branches: [oracleai-fullstack]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target || 'prod' }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Trigger backend deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_URL is not set, skipping."
          fi

      - name: Trigger frontend deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL"
          else
            echo "VERCEL_DEPLOY_HOOK_URL is not set, skipping."
          fi

      - name: Post-deploy health checks
        env:
          BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
          FRONTEND_HEALTHCHECK_URL: ${{ secrets.FRONTEND_HEALTHCHECK_URL }}
        run: |
          if [ -n "$BACKEND_HEALTHCHECK_URL" ]; then
            curl -fsSL "$BACKEND_HEALTHCHECK_URL"
          fi
          if [ -n "$FRONTEND_HEALTHCHECK_URL" ]; then
            curl -fsSL "$FRONTEND_HEALTHCHECK_URL"
          fi

      - name: Rollback on failure
        if: failure()
        env:
          BACKEND_ROLLBACK_HOOK_URL: ${{ secrets.BACKEND_ROLLBACK_HOOK_URL }}
          FRONTEND_ROLLBACK_HOOK_URL: ${{ secrets.FRONTEND_ROLLBACK_HOOK_URL }}
        run: |
          if [ -n "$BACKEND_ROLLBACK_HOOK_URL" ]; then
            curl -fsSL -X POST "$BACKEND_ROLLBACK_HOOK_URL" || true
          fi
          if [ -n "$FRONTEND_ROLLBACK_HOOK_URL" ]; then
            curl -fsSL -X POST "$FRONTEND_ROLLBACK_HOOK_URL" || true
          fi
