specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: CheckIn
    network: bsc-testnet
    source:
      address: "0xFa7b9AC470CF93866D725d4F45356B09456E8c64"
      abi: CheckIn
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - CheckInEvent
        - ProtocolMetrics
      abis:
        - name: CheckIn
          file: ../contracts/artifacts/contracts/CheckIn.sol/CheckIn.json
      eventHandlers:
        - event: CheckedIn(indexed address,uint256,uint8,uint256,uint256)
          handler: handleCheckedIn
      file: ./src/mappings/checkin.ts

  - kind: ethereum
    name: Prediction
    network: bsc-testnet
    source:
      address: "0xAfC6158f83b42707D9589e374fB4188052f2d25e"
      abi: Prediction
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PredictionEvent
        - VoteEvent
        - EventResolution
        - ProtocolMetrics
      abis:
        - name: Prediction
          file: ../contracts/artifacts/contracts/Prediction.sol/Prediction.json
      eventHandlers:
        - event: EventCreated(indexed uint256,string,uint8,uint256)
          handler: handleEventCreated
        - event: VoteSubmitted(indexed uint256,indexed address,bool)
          handler: handleVoteSubmitted
        - event: EventResolved(indexed uint256,bool,uint256)
          handler: handleEventResolved
        - event: VoteFeeDistributed(indexed uint256,indexed address,uint256,uint256,uint256)
          handler: handleVoteFeeDistributed
      file: ./src/mappings/prediction.ts

  - kind: ethereum
    name: Staking
    network: bsc-testnet
    source:
      address: "0x51fBd334319E8bb601883223d4Ce681Ce6251B12"
      abi: Staking
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - StakeEvent
        - ProtocolMetrics
      abis:
        - name: Staking
          file: ../contracts/artifacts/contracts/Staking.sol/Staking.json
      eventHandlers:
        - event: Staked(indexed address,uint256)
          handler: handleStaked
        - event: UnstakeRequested(indexed address,uint256)
          handler: handleUnstakeRequested
        - event: Unstaked(indexed address,uint256)
          handler: handleUnstaked
      file: ./src/mappings/staking.ts

  - kind: ethereum
    name: PrizePoolV2
    network: bsc-testnet
    source:
      address: "0x3546771AEED588Ecdf62BE1785A8fEDac568722B"
      abi: PrizePoolV2
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PrizeEpoch
        - PrizeClaim
        - ProtocolMetrics
      abis:
        - name: PrizePoolV2
          file: ../contracts/artifacts/contracts/PrizePoolV2.sol/PrizePoolV2.json
      eventHandlers:
        - event: EpochStarted(indexed uint256,bytes32,uint256)
          handler: handleEpochStarted
        - event: PrizeClaimed(indexed uint256,indexed address,uint256,uint256)
          handler: handlePrizeClaimed
      file: ./src/mappings/prizepool.ts

  - kind: ethereum
    name: PredictionNFT
    network: bsc-testnet
    source:
      address: "0x35375A2D6C5ca01Afb7a88b7aB44651ceacc4591"
      abi: PredictionNFT
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PredictionNFTToken
        - User
      abis:
        - name: PredictionNFT
          file: ../contracts/artifacts/contracts/PredictionNFT.sol/PredictionNFT.json
      eventHandlers:
        - event: StreakNFTMinted(indexed address,indexed uint256,uint8,uint256,uint256)
          handler: handleStreakNFTMinted
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleNFTTransfer
      file: ./src/mappings/nft.ts

  - kind: ethereum
    name: OracleGovernance
    network: bsc-testnet
    source:
      address: "0x7f75c4B99E7AD7F5027f928b0244f476FcF8DB94"
      abi: OracleGovernance
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - GovernanceProposal
        - GovernanceVote
        - ProtocolMetrics
      abis:
        - name: OracleGovernance
          file: ../contracts/artifacts/contracts/OracleGovernance.sol/OracleGovernance.json
      eventHandlers:
        - event: ProposalCreated(indexed uint256,indexed address,string,uint256,uint256)
          handler: handleProposalCreated
        - event: VoteCast(indexed uint256,indexed address,bool,uint256)
          handler: handleVoteCast
        - event: ProposalExecuted(indexed uint256)
          handler: handleProposalExecuted
        - event: ProposalCancelled(indexed uint256)
          handler: handleProposalCancelled
      file: ./src/mappings/governance.ts

  - kind: ethereum
    name: InsurancePool
    network: bsc-testnet
    source:
      address: "0x03412E10B200BD7a1BB2F8Ab78a23603777E2d38"
      abi: InsurancePool
      startBlock: 51000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - InsuranceClaim
        - ProtocolMetrics
      abis:
        - name: InsurancePool
          file: ../contracts/artifacts/contracts/InsurancePool.sol/InsurancePool.json
      eventHandlers:
        - event: ClaimFiled(indexed uint256,indexed address,uint256,uint256)
          handler: handleClaimFiled
        - event: ClaimApproved(indexed uint256,uint256)
          handler: handleClaimApproved
        - event: ClaimDenied(indexed uint256)
          handler: handleClaimDenied
        - event: ClaimPaid(indexed uint256,indexed address,uint256)
          handler: handleClaimPaid
      file: ./src/mappings/insurance.ts
